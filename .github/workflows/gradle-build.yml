name: Build Gradle Tools
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    outputs:
      aggregate-jacoco-id: ${{ steps.upload-aggregate-jacoco.outputs.artifact-id }}
      aggregate-kdoc-id: ${{ steps.upload-aggregate-kdoc.outputs.artifact-id }}
      aggregate-test-id: ${{ steps.upload-aggregate-test.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25 (Kotlin compilation toolchain)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle/Detekt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Build
        run: ./gradlew --info --stacktrace :build
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: Test Results
          fail_on_failure: false
      - name: Upload Aggregate Test Report
        id: upload-aggregate-test
        uses: actions/upload-artifact@v7
        with:
          name: test-aggregate
          path: aggregation/testing/build/reports/tests/test/aggregated-results
      - name: Upload Aggregate KDoc
        id: upload-aggregate-kdoc
        uses: actions/upload-artifact@v7
        with:
          name: kdoc-aggregate
          path: aggregation/dokka/build/dokka/html
      - name: Upload Aggregate JaCoCo Code Coverage Report
        id: upload-aggregate-jacoco
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-aggregate
          path: aggregation/jacoco/build/reports/jacoco/testCodeCoverageReport

  jacoco:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write

    steps:
      - name: Download Aggregate JaCoCo Code Coverage Artifact
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{needs.build.outputs.aggregate-jacoco-id}}
      - name: Report JaCoCo
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: jacoco-aggregate/testCodeCoverageReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Aggregate Code Coverage
          update-comment: true
          # FIXME Remove after improvements are made
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25 (Kotlin compilation toolchain)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle/Detekt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Publish
        run: ./gradlew --info --stacktrace :publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Aggregate KDoc
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.build.outputs.aggregate-kdoc-id }}
          path: kdoc
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kdoc/kdoc-aggregate
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4