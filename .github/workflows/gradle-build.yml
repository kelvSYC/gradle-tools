name: Build Gradle Tools
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      packages: read
      pull-requests: write
    outputs:
      aggregate-jacoco-id: ${{ steps.upload-aggregate-jacoco.outputs.artifact-id }}
      aggregate-test-id: ${{ steps.upload-aggregate-test.outputs.artifact-id }}
      integration-test-id: ${{ steps.upload-integration-test.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25 (Kotlin compilation toolchain)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle/Detekt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Build
        run: ./gradlew :build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Integration Tests
        # Blocking step: TestKit probes for configuration-cache and WorkerExecutor serialization
        # boundaries. Runs after :build so unit-test feedback comes first.
        # When adding a new *-base component with a BuildService, also add it here and to the
        # integrationTestComponents set in aggregation/testing/build.gradle.kts.
        run: >-
          ./gradlew
          :artifactory-base:integrationTest
          :aws-imds-java-base:integrationTest
          :aws-s3-java-base:integrationTest
          :aws-secrets-manager-java-base:integrationTest
          :aws-sns-java-base:integrationTest
          :aws-sns-kotlin-base:integrationTest
          :azure-blob-storage-base:integrationTest
          :bitbucket-cloud-base:integrationTest
          :bitbucket-data-center-base:integrationTest
          :google-cloud-storage-base:integrationTest
          :aggregation:testing:collectIntegrationTestReports
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: Test Results
          fail_on_failure: false
      - name: Upload Aggregate Test Report
        id: upload-aggregate-test
        uses: actions/upload-artifact@v7
        with:
          name: test-aggregate
          path: aggregation/testing/build/reports/tests/test/aggregated-results
      - name: Upload Integration Test Reports
        id: upload-integration-test
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test
          path: aggregation/testing/build/reports/tests/integrationTest/raw
      - name: Upload Aggregate JaCoCo Code Coverage Report
        id: upload-aggregate-jacoco
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-aggregate
          path: aggregation/jacoco/build/reports/jacoco/testCodeCoverageReport

  docs:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25 (Kotlin compilation toolchain)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle/Detekt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Build Documentation
        run: ./gradlew :dokkaGenerate
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Aggregate KDoc
        id: upload-aggregate-kdoc
        uses: actions/upload-artifact@v7
        with:
          name: kdoc-aggregate
          path: aggregation/dokka/build/dokka/html

  jacoco:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download Aggregate JaCoCo Code Coverage Artifact
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{needs.build.outputs.aggregate-jacoco-id}}
          path: jacoco-aggregate
      - name: Report JaCoCo
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: jacoco-aggregate/testCodeCoverageReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Aggregate Code Coverage
          update-comment: true
          # FIXME Remove after improvements are made
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25 (Kotlin compilation toolchain)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Set up JDK 21 (Gradle/Detekt runtime)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Create initial tag for semver
        run: |
          if ! git rev-parse v0.1.0 >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag v0.1.0
            git push origin v0.1.0
          fi
      - name: Delete existing snapshot versions
        run: |
          for pkg in $(gh api -H "Accept: application/vnd.github+json" "/user/packages?package_type=maven&per_page=100" --jq '.[].name'); do
            for ver_id in $(gh api -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions?per_page=100" --jq '.[] | select(.name | test("-SNAPSHOT$"; "i")) | .id'); do
              gh api -X DELETE -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions/${ver_id}" || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Snapshot
        run: ./gradlew ":publish" -Dsemver.stage=snapshot -Dsemver.scope=patch
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Aggregate KDoc
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.docs.outputs.aggregate-kdoc-id }}
          path: kdoc
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: kdoc
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
